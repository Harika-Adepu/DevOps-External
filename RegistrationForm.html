<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(120deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: #ffffff;
            width: 400px;
            padding: 30px 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #444;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: #6c63ff;
        }

        textarea {
            resize: none;
            height: 70px;
        }

        /* FIXED RADIO ALIGNMENT */
        .options {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            color: #333;
            cursor: pointer;
        }

        .options input {
            width: auto;   /* important fix */
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #554fd8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Registration Form</h1>

        <form>
            <div class="field">
                <label>Name</label>
                <input type="text" placeholder="Enter your name">
            </div>

            <div class="field">
                <label>Age</label>
                <input type="number" placeholder="Enter your age">
            </div>

            <div class="field">
                <label>Address</label>
                <textarea placeholder="Enter your address"></textarea>
            </div>

            <div class="field">
                <label>Father Name</label>
                <input type="text" placeholder="Enter father name">
            </div>

            <div class="field">
                <label>Mother Name</label>
                <input type="text" placeholder="Enter mother name">
            </div>

            <div class="field">
                <label>Hallticket Number</label>
                <input type="number" placeholder="Enter hallticket number">
            </div>

            <div class="field">
                <label>Gender</label>
                <div class="options">
                    <label><input type="radio" name="gender"> Male</label>
                    <label><input type="radio" name="gender"> Female</label>
                </div>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
